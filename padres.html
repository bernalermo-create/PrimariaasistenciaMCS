<head>
<meta charset="UTF-8">

<title>Portal de Padres — Primaria — Colegio Miguel de Cervantes Saavedra I.E.D.</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#146238">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --azul:#1a3a6c;--verde:#1a5c3a;--verde2:#2d8653;--naranja:#e67e22;--rojo:#c0392b;--morado:#7c3aed;
  --gris:#4a4a4a;--gborde:#8090a0;--gfondo:#f4f6f9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gfondo);color:#1a1a2e;min-height:100vh;padding-bottom:30px}
.header{background:linear-gradient(90deg,#0d2e1e 0%,#146238 55%,#1a3a6c 100%);color:#fff;padding:18px 20px;text-align:center}
.header img{width:56px;height:56px;margin-bottom:6px}
.header h1{font-size:15px;font-weight:800}
.header p{font-size:11px;opacity:.85;margin-top:2px}
#content{max-width:480px;margin:16px auto;padding:0 14px}
.empty{text-align:center;padding:50px 20px;color:var(--gris)}
.empty .icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:800;margin-bottom:6px}
.tarjeta-est{background:#fff;border:2px solid var(--gborde);border-radius:12px;padding:18px;text-align:center;margin-bottom:14px}
.nombre-est{font-size:18px;font-weight:900;color:var(--azul)}
.curso-est{font-size:12px;color:var(--gris);font-weight:700;margin-top:4px}
.notif-ok{background:#e8f5ee;border:2px solid var(--verde);border-radius:10px;padding:12px;font-size:12.5px;font-weight:700;color:var(--verde);text-align:center;margin-bottom:14px}
.btn-activar{width:100%;padding:14px;background:linear-gradient(135deg,#1a8c4a,#146238);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
.notif-hint{font-size:11px;color:var(--gris);text-align:center;margin:8px 0 14px}
.resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.resumen-card{background:#fff;border:2px solid var(--gborde);border-radius:10px;padding:12px 6px;text-align:center}
.resumen-num{font-size:22px;font-weight:900}
.resumen-lbl{font-size:9.5px;color:var(--gris);font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-top:2px}
.lista-hdr{font-size:12px;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.03em;margin:18px 0 8px}
.lista-eventos{background:#fff;border:2px solid var(--gborde);border-radius:10px;overflow:hidden}
.evento-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #eee;font-size:12.5px}
.evento-row:last-child{border-bottom:none}
.evento-fecha{font-weight:700;flex:1}
.evento-tag{color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
.evento-bloque{color:var(--gris);font-size:11px}
.aviso-footer{font-size:10.5px;color:var(--gris);text-align:center;margin-top:20px;line-height:1.5;padding:0 10px}
details.ayuda{margin-top:16px;background:#fff;border:2px solid var(--gborde);border-radius:10px;padding:12px 14px}
details.ayuda summary{cursor:pointer;font-weight:800;font-size:12px;color:var(--azul)}
details.ayuda p{font-size:11.5px;color:var(--gris);margin-top:8px;line-height:1.6}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>

      headers:{'Content-Type':'text/plain;charset=utf-8'}
    });
    return await res.json();
  }catch(err){
    return {success:false, message:'Sin conexión: '+err.message};
  }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

function getTokenDeUrl(){
  const params = new URLSearchParams(location.search);
  const t = params.get('t');
  if(t) localStorage.setItem('padres_token', t); // recordar para cuando abran la app instalada, sin el enlace completo
  return t || localStorage.getItem('padres_token') || '';
}

let TOKEN = getTokenDeUrl();
let INFO = null;
let firebaseApp = null;

async function init(){
  if(!TOKEN){
    mostrarError('Este enlace no incluye tu código de acceso. Pide el enlace o el código QR correcto en la institución.');
    return;
  }
  if('serviceWorker' in navigator){
    try{ await navigator.serviceWorker.register('./sw.js'); }catch(e){ console.warn('No se pudo registrar el service worker', e); }
  }
  await cargarInfo();
}

async function cargarInfo(){
  document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">🔄</div><h3>Cargando…</h3></div>';
  const r = await api('getInfoAcudiente', {token: TOKEN});
  if(!r.success){ mostrarError(r.message||'No se pudo cargar la información'); return; }
  INFO = r.data;
  render();
}

function mostrarError(msg){
  document.getElementById('content').innerHTML = `<div class="empty"><div class="icon">⚠️</div><h3>No se pudo abrir</h3><p>${msg}</p></div>`;
}

function render(){
  const c = document.getElementById('content');
  const totalInasistencias = INFO.eventos.filter(e=>e.estado==='falta').length;
  const totalRetardos = INFO.eventos.filter(e=>e.estado==='retardo').length;
  const totalEvasiones = INFO.eventos.filter(e=>e.estado==='evasion').length;

  let html = `
  <div class="tarjeta-est">
    <div class="nombre-est">${INFO.nombre}</div>
    <div class="curso-est">Curso ${INFO.curso}</div>
  </div>
  <div id="notif-area"></div>
  <div class="resumen-grid">
    <div class="resumen-card" style="border-color:var(--rojo)"><div class="resumen-num" style="color:var(--rojo)">${totalInasistencias}</div><div class="resumen-lbl">Inasistencias</div></div>
    <div class="resumen-card" style="border-color:var(--naranja)"><div class="resumen-num" style="color:var(--naranja)">${totalRetardos}</div><div class="resumen-lbl">Retardos</div></div>
    <div class="resumen-card" style="border-color:var(--morado)"><div class="resumen-num" style="color:var(--morado)">${totalEvasiones}</div><div class="resumen-lbl">Evasiones</div></div>
  </div>
  <div class="lista-hdr">Historial ${new Date().getFullYear()}</div>
  <div class="lista-eventos">
    ${INFO.eventos.length ? INFO.eventos.map(e=>{
      const etiqueta = e.estado==='falta'?'Inasistencia':e.estado==='retardo'?'Retardo':'Evasión';
      const color = e.estado==='falta'?'var(--rojo)':e.estado==='retardo'?'var(--naranja)':'var(--morado)';
      return `<div class="evento-row"><span class="evento-fecha">${e.fecha}</span><span class="evento-tag" style="background:${color}">${etiqueta}</span><span class="evento-bloque">Bloque ${e.bloque}</span></div>`;
    }).join('') : '<div class="empty" style="padding:30px"><div class="icon">✅</div><p>Sin novedades registradas este año.</p></div>'}
  </div>
  <details class="ayuda">
    <summary>📲 ¿Cómo instalo esto en mi celular?</summary>
    <p><b>Android (Chrome):</b> toca el menú ⋮ arriba a la derecha → "Instalar aplicación" o "Agregar a pantalla de inicio".<br><br>
    <b>iPhone (Safari):</b> toca el botón de compartir (el cuadrito con la flecha hacia arriba) → "Agregar a pantalla de inicio".<br><br>
    Después de instalarlo, actívale las notificaciones con el botón de arriba y te avisaremos apenas haya una novedad, sin que tengas que volver a entrar.</p>
  </details>
  <div class="aviso-footer">Esta es una línea informativa de un solo sentido — los mensajes que se escriban aquí no son revisados. Para cualquier consulta, comunícate directamente con la institución.</div>
  `;
  c.innerHTML = html;
  renderNotifArea();
}

function renderNotifArea(){
  const area = document.getElementById('notif-area');
  if(INFO.notificacionesActivas){
    area.innerHTML = `<div class="notif-ok">🔔 Notificaciones activadas — te avisaremos apenas haya una novedad.</div>`;
  } else if(!firebaseConfigurado()){
    area.innerHTML = '';
  } else {
    area.innerHTML = `<button class="btn-activar" onclick="activarNotificaciones()">🔔 Activar notificaciones</button>
      <p class="notif-hint">Actívalas para enterarte al instante, sin tener que entrar a revisar.</p>`;
  }
}

function inicializarFirebase(){
  if(!firebaseConfigurado()) return null;
  if(!firebaseApp) firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
  return firebaseApp;
}

async function activarNotificaciones(){
  if(!('Notification' in window)){ toast('Este navegador no admite notificaciones'); return; }
  if(!inicializarFirebase()){ toast('Las notificaciones todavía no están configuradas, vuelve más tarde'); return; }
  try{
    const permiso = await Notification.requestPermission();
    if(permiso !== 'granted'){ toast('No se concedió el permiso de notificaciones'); return; }
    const reg = await navigator.serviceWorker.ready;
    const messaging = firebase.messaging();
    const fcmToken = await messaging.getToken({vapidKey: VAPID_PUBLIC_KEY, serviceWorkerRegistration: reg});
    const r = await api('guardarTokenPush', {token: TOKEN, fcmToken});
    if(r.success){
      INFO.notificacionesActivas = true;
      renderNotifArea();
      toast('¡Listo! Notificaciones activadas.');
    } else {
      toast(r.message||'No se pudo activar');
    }
  }catch(e){
    toast('No se pudo activar: '+e.message);
  }
}

init();
</script>
</body>
</html>
