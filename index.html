<style>
:root{--verde:#146238;--azul:#1a3a6c;--gris:#4a4a4a;--gborde:#8090a0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;

.card p{font-size:12px;color:var(--gris);margin-top:4px;margin-bottom:26px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:10px;font-size:14px;font-weight:800;
  cursor:pointer;text-decoration:none;color:#fff;background:linear-gradient(135deg,#1a8c4a,#146238);margin-bottom:12px}
.btn:hover{filter:brightness(1.08)}
.hint{font-size:11px;color:var(--gris);line-height:1.5;border-top:1.5px solid #eee;padding-top:16px;margin-top:8px}
</style>
